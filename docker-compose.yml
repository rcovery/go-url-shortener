services:
  db:
    container_name: shortener_db
    image: postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
      PGDATA: /data/postgres
      POSTGRES_DB: gourl
    volumes:
      - db:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d gourl" ]
      interval: 30s
      timeout: 10s
      retries: 5
  apm:
    image: grafana/otel-lgtm
    container_name: shortener_apm
    ports:
      - "3999:3000"
      - "4317:4317"
      - "4318:4318"
networks:
  db:
    driver: bridge

volumes:
  db:
